<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./fonts.css">
    <title>Blog</title>
    <style>
        .slider_a {
            position: relative;
            width: 100%;
            height: 33.313rem;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
        }

        .slider_a_wrapper {
            z-index: 1;
            width: 300%;
            height: 100%;
            position: absolute;
            display: flex;
            transition: all 1s ease-in-out;
        }

        .slider_a_element {
            width: calc(100%/3);
            height: 100%;
        }

        .slider_a input {
            z-index: 2;
        }

        .element_one {
            background-image: url("./assets/img/header\ photo.png");
        }

        .element_two {
            background-color: brown;
        }

        .element_three {
            background-color: goldenrod;
        }

        .slider_a input[value="one"]:checked~.slider_a_wrapper {
            transform: translateX(calc(100%/3));
        }

        .slider_a input[value="two"]:checked~.slider_a_wrapper {
            transform: translateX(0);
        }

        .slider_a input[value="three"]:checked~.slider_a_wrapper {
            transform: translateX(calc(-100%/3));
        }
    </style>
</head>

<body>
    <section class="highlights_section">
        <header class="highlights_header">
            <div class="highlights_header_wrapper">
                <img src="./assets/icons/rocket_launch.svg" alt="Icon von einer Rakete">
                <h2>Highlights</h2>
            </div>
            <p>From the vibrant cultures of Asia to the sun-drenched islands of the Caribbean and the serene
                landscapes of Scandinavia, each destination offers a distinct way to explore the world. </p>
        </header>
        <div class="slider">
            <!-- <img src="./assets/img/header photo.png" alt=""> -->
            <section class="slider_a">
                <input type="radio" name="slider" value="one" checked>
                <input type="radio" name="slider" value="two">
                <input type="radio" name="slider" value="three">

                <div class="slider_a_wrapper">
                    <div class="slider_a_element element_one"></div>
                    <div class="slider_a_element element_two"></div>
                    <div class="slider_a_element element_three"></div>
                </div>
            </section>
        </div>
    </section>
