<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./fonts.css">
    <title>Blog</title>
</head>

<body>

    <section class="form_section">
        <form action="" method="get" class="form">
            <div class="contact_from">
                <div class="contact_main">
                    <img src="assets/icons/person_pin.png" alt="Person">
                    <h3>Contact from</h3>
                </div>
                <p>Have a question or an ideia to collaborate? <br>Get in touch-I'd love hear from you and explore how
                    we can work together.</p>

                <div>
                    <label class="label" for="text"> What`s your name?
                        <input type="text" name="name">
                    </label>
                    <label class="label" for="text">What's your email?
                        <input type="email" name="email">
                    </label>
                </div>

                <div>
                    <label class="label" for="text">How can i help? <input type="text"> </label>
                </div>
                <label id="check" for="check">
                    <input type="checkbox">
                    I've read the <span class="privacy_policy"> privacy policy</span> and agree to the processing of my
                    data as outlined.
                </label>
                <br><br>
                <button>Send</button>
            </div>
        </form>
    </section>

    <footer>
        <div class="footer_wrapper">
            <div class="footer_schriftlich">
                <div class="footer_copyright">
                    <img src="assets/icons/copyright-2.png">
                    <p>Travel Blog 2026</p>
                </div>
                <p>Imprint</p>
                <p>Cookie Preferences</p>
            </div>

            <div class="footer_social">
                <a href="https://www.tiktok.com/explore"><img src="assets/icons/Tiktok_icon 1.png" alt="Tiktok"></a>
                <a href="https://www.youtube.com/"><img src="assets/icons/youtube.png" alt="Youtube"></a>
                <a href="https://www.facebook.com/"><img src="assets/icons/facebook.png" alt="Facebook"></a>
                <a href="https://www.instagram.com/"> <img src="assets/icons/Instagram_logo_2016 1.png" alt="Instagram">
                </a>
            </div>
        </div>
    </footer>
</body>

</html>
